<!DOCTYPE html>
<html>
<head>
  <title>Login Admin</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height:100vh;">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body">
          <h4 class="text-center mb-4">Login Admin</h4>
          <input type="text" id="username" class="form-control mb-3" placeholder="Username">
          <input type="password" id="password" class="form-control mb-3" placeholder="Password">
          <button class="btn btn-primary w-100" onclick="login()">Login</button>
          <p id="error" class="text-danger mt-3 text-center"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const errorElement = document.getElementById("error");

  // Alamat harus /api/login agar cocok dengan server.js
  fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  })
  .then(async res => {
    const data = await res.json();
    if (res.ok && data.success) {
      alert("Login Berhasil!");
      window.location.href = "admin.html";
    } else {
      errorElement.innerText = data.message || "Login Gagal";
    }
  })
  .catch(err => {
    errorElement.innerText = "Koneksi ke server gagal!";
  });
}
</script>
</body>
</html>
